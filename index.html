<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css?v=10">
  <title>小舟单词 v10</title>
  <script>
    // 🔥 自毁脚本：在页面加载前销毁所有旧 Service Worker 和缓存
    if ('caches' in window) {
      caches.keys().then(function(names) {
        return Promise.all(names.map(function(n) { return caches.delete(n) }))
      })
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister() })
      })
    }
  </script>
</head>
<body>
  <div id="app">

    <!-- ====== 首页 ====== -->
    <div class="page active" id="page-index">
      <div style="padding:16px 0 12px">
        <div style="font-size:22px;font-weight:700">📚 小舟单词</div>
        <div style="font-size:14px;color:var(--text-secondary);margin-top:2px">背英语单词，每天进步一点点</div>
      </div>
      <div class="card" id="home-stats"></div>
      <div id="home-categories"></div>
    </div>

    <!-- ====== 词库详情 ====== -->
    <div class="page" id="page-deck">
      <div class="page-header" id="deck-header"></div>
      <div id="deck-info"></div>
      <div id="deck-words"></div>
      <div style="padding:12px 0">
        <button class="btn btn-primary" id="deck-study-btn" style="width:100%"></button>
      </div>
    </div>

    <!-- ====== 翻卡学习 ====== -->
    <div class="page" id="page-study">
      <div class="page-header" id="study-header"></div>
      <div id="study-content"></div>
    </div>

    <!-- ====== 文章翻译 ====== -->
    <div class="page" id="page-translate">
      <div class="page-header"><span class="title">📝 文章翻译</span></div>
      
      <!-- 输入区域 -->
      <div class="card">
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:12px">输入中文文章，AI 自动翻译成英文，提取核心单词背诵</p>
        
        <!-- 上传按钮 -->
        <div class="upload-bar">
          <button class="upload-btn" id="upload-camera">
            <span class="ub-icon">📷</span>
            <span class="ub-text">拍照</span>
          </button>
          <button class="upload-btn" id="upload-image">
            <span class="ub-icon">🖼️</span>
            <span class="ub-text">图片</span>
          </button>
          <button class="upload-btn" id="upload-file">
            <span class="ub-icon">📄</span>
            <span class="ub-text">文档</span>
          </button>
        </div>
        
        <!-- 隐藏的 file input -->
        <input type="file" id="file-camera-input" accept="image/*" capture="environment" style="display:none">
        <input type="file" id="file-image-input" accept="image/*" multiple style="display:none">
        <input type="file" id="file-doc-input" accept=".txt,.md,.doc,.docx,.pdf" style="display:none">
        
        <div id="upload-preview"></div>
        
        <textarea class="translate-input" id="translate-input" placeholder="直接输入中文文章，或通过上方按钮拍照/上传图片/上传文档..." style="min-height:160px"></textarea>
        <button class="btn btn-primary" id="translate-btn" style="width:100%;margin-top:12px">翻译并提取单词</button>
      </div>
      <div class="translate-result" id="translate-result"></div>
    </div>

    <!-- ====== 复习中心 ====== -->
    <div class="page" id="page-review">
      <div class="page-header"><span class="title">🔄 复习中心</span></div>
      <div class="card" id="review-stats"></div>
      <div class="review-tabs" id="review-tabs"></div>
      <div id="review-words"></div>
      <div style="padding:12px 0">
        <button class="btn btn-primary" id="review-study-btn" style="width:100%">开始复习</button>
      </div>
    </div>

    <!-- ====== 单词详情 ====== -->
    <div class="page" id="page-word-detail">
      <div class="page-header" id="wd-header"></div>
      <div id="wd-content"></div>
    </div>

    <!-- ====== 个人中心 ====== -->
    <div class="page" id="page-profile">
      <div class="profile-avatar">
        <div class="pa-icon">📚</div>
        <div class="pa-name">小舟用户</div>
      </div>
      <div class="card" id="profile-stats"></div>

      <div class="card" id="profile-extra"></div>

      <div class="profile-section">
        <div class="ps-title">⚙️ 设置</div>
        <div class="card">
          <div class="form-group">
            <label>AI API Key（可选，留空用演示模式）</label>
            <input type="password" id="api-key" placeholder="sk-...">
          </div>
          <div class="form-group">
            <label>AI API URL</label>
            <input type="text" id="api-url" placeholder="https://api.openai.com/v1/chat/completions">
          </div>
          <button class="btn btn-primary" id="save-settings" style="width:100%">保存设置</button>
        </div>
      </div>

      <div class="profile-section">
        <div class="ps-title">📌 其他</div>
        <div class="card">
          <div class="deck-item" id="clear-data" style="margin:0">
            <div>🗑️ 清除所有学习数据</div>
          </div>
          <div class="deck-item" id="about-app" style="margin:0">
            <div>ℹ️ 关于小舟单词</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ====== Tab Bar ====== -->
    <div class="tab-bar">
      <div class="tab-item active" data-page="page-index"><span class="tab-icon">🏠</span>首页</div>
      <div class="tab-item" data-page="page-translate"><span class="tab-icon">📝</span>文章翻译</div>
      <div class="tab-item" data-page="page-review"><span class="tab-icon">🔄</span>复习</div>
      <div class="tab-item" data-page="page-profile"><span class="tab-icon">👤</span>我的</div>
    </div>
  </div>

  <script src="js/app.js?v=10"></script>
</body>
</html>
